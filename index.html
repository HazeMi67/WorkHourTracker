<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkHourTracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="app-header">
    <h1>🕒 WorkHourTracker</h1>
    <div class="header-info">
      <span id="todayDate"></span>
      <span id="currentWeek"></span>
      <span id="currentTime"></span>
    </div>
  </header>

  <!-- Dashboard Cards -->
  <section id="dashboard" class="dashboard-grid">
    <div class="card metric">
      <div class="icon">🎯</div>
      <div class="title">Weekly Target</div>
      <input type="number" id="weeklyTarget" class="value" />
      <div class="subtitle">hours set</div>
    </div>
    <div class="card metric">
      <div class="icon">⏱</div>
      <div class="title">Worked Hours</div>
      <div id="totalWorked" class="value">0.00</div>
      <div class="subtitle">this week</div>
    </div>
    <div class="card metric">
      <div class="icon">📉</div>
      <div class="title">Remaining Hours</div>
      <div id="remainingHours" class="value">40.00</div>
      <div class="subtitle">to reach target</div>
    </div>
    <div class="card metric">
      <div class="icon">🔥</div>
      <div class="title">Overtime</div>
      <div id="overtimeHours" class="value">0.00</div>
      <div class="subtitle">beyond target</div>
    </div>
  </section>

  <!-- Progress Bar -->
  <section class="progress-card">
    <label>Weekly Progress</label>
    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
  </section>

  <!-- Record Form -->
  <section id="inputSection" class="card form-card">
    <h2>Add Record</h2>
    <div class="form-grid">
      <label>Date <input type="date" id="date" /></label>

      <!-- Clock In dropdowns -->
      <label>Clock In
        <div class="time-select">
          <select id="startHour"></select> :
          <select id="startMinute"></select>
        </div>
      </label>

      <!-- Clock Out dropdowns -->
      <label>Clock Out
        <div class="time-select">
          <select id="endHour"></select> :
          <select id="endMinute"></select>
        </div>
      </label>

      <label>Break Time (hrs) <input type="number" step="0.25" id="break" /></label>
      <label>Remarks <input type="text" id="remarks" /></label>
    </div>
    <div class="form-actions">
      <button id="addBtn" class="btn-primary">Add Record</button>
      <button id="clearBtn" class="btn-secondary">Clear All</button>
    </div>
  </section>

  <!-- Search -->
  <section id="searchSection" class="card">
    <h2>Search Records</h2>
    <label>Search by Date <input type="date" id="searchDate" /></label>
    <div class="form-actions">
      <button id="searchBtn" class="btn-primary">Search</button>
      <button onclick="renderTable()" class="btn-secondary">Show All</button>
    </div>
  </section>

  <!-- Records Table -->
  <section id="tableSection" class="card">
    <h2>Records</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Break</th>
            <th>Worked Hours</th>
            <th>Remarks</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recordsTableBody"></tbody>
      </table>
    </div>
  </section>
</body>
</html>
